<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0b0c11" />
    <title>my-monkeys · marketplace</title>
    <meta
      name="description"
      content="The my-monkeys plugin marketplace UI — search and browse skills, commands, agents and plugins."
    />
    <script>
      // Apply the saved theme before first paint (default: dark). Avoids a flash.
      try {
        document.documentElement.setAttribute(
          "data-theme",
          localStorage.getItem("mm-theme") === "light" ? "light" : "dark"
        );
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
