name: Deploy preview to GitHub Pages

# Publishes ONLY the preview/ folder (the marketplace UI design preview) to
# GitHub Pages. The marketplace catalog itself (marketplace.json, plugins/) is
# never included in the published site.

on:
  push:
    branches: [main]
    paths:
      - "preview/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (Source: GitHub Actions) on the first run,
          # so no manual Settings step is needed once the repo is public.
          enablement: true

      - name: Upload preview/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: preview

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
